name: test-systemc-examples

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      renode_gitrev:
        description: 'Renode git revision'
        required: false
        default: '95150-win-systemc'
      renode_gitrepo:
        description: 'Renode git repository'
        required: false

env:
  DEBIAN_FRONTEND: noninteractive
  CMAKE_PREFIX_PATH: /opt/toolchains

jobs:
  build-zephyr-binaries:
    name: Build Zephyr Binaries
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get -qqy update
            sudo apt-get install -qqy cmake ninja-build
          elif [ "${{ runner.os }}" = "Windows" ]; then
            choco feature enable -n allowGlobalConfirmation
            choco install ninja cmake
          else
            echo "Unknown runner!"
            exit 1
          fi
      
      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: arm-zephyr-eabi

      - name: Build Zephyr
        shell: bash
        run: |
          mkdir -p artifacts/zephyr_binaries
          for example in examples/*/zephyr; do
            example_name=$(echo $example | cut -f 2 -d '/')
            west build -p -b stm32f401_mini $example
            cp build/zephyr/zephyr.elf artifacts/zephyr_binaries/$example_name.elf
          done

      - name: Upload Zephyr binaries
        uses: actions/upload-artifact@v4
        with:
          name: zephyr_binaries-${{ runner.os }}-${{ github.run_id }}
          path: artifacts/zephyr_binaries

  build-systemc:
    name: Build SystemC
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get -qqy update
            sudo apt-get install -qqy cmake
          elif [ "${{ runner.os }}" = "Windows" ]; then
            choco feature enable -n allowGlobalConfirmation
            choco install cmake
          else
            echo "Unknown runner!"
            exit 1
          fi

      - name: Set CMake generator
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export CMAKE_GENERATOR="Visual Studio 17 2022"

      - name: Build library
        shell: bash
        run: |
          mkdir -p build
          pushd build
            cmake ../systemc -DBUILD_SHARED_LIBS=OFF \
                             -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                             -DCMAKE_CXX_STANDARD=17 \
                             -DCMAKE_POLICY_VERSION_MINIMUM="3.5"
                              
            cmake --build . -j $(nproc)
          popd

      - name: Upload SystemC library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os == 'Windows' && format('{0}-{1}-libsystemc.lib', runner.os, github.run_id) || format('{0}-{1}-libsystemc.a', runner.os, github.run_id) }}
          path: ${{ runner.os == 'Windows' && 'build/src/Debug/systemc.lib' || 'build/src/libsystemc.a' }}

  build-examples:
    name: Build Examples
    needs: build-systemc
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download SystemC library
        uses: actions/download-artifact@v4
        with:
          name: ${{ runner.os == 'Windows' && format('{0}-{1}-libsystemc.lib', runner.os, github.run_id) || format('{0}-{1}-libsystemc.a', runner.os, github.run_id) }}
          path: artifacts/systemc

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get -qqy update
            sudo apt-get install -qqy cmake
          elif [ "${{ runner.os }}" = "Windows" ]; then
            choco feature enable -n allowGlobalConfirmation
            choco install cmake
          else
            echo "Unknown runner!"
            exit 1
          fi

      - name: Download and build Renode
        uses: antmicro/renode-test-action@v5.0.0
        with:
          renode-repository: ${{ inputs.renode_gitrepo || 'https://github.com/renode/renode' }}
          renode-revision: ${{ inputs.renode_gitrev || 'master' }}

      - name: Set CMake generator
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export CMAKE_GENERATOR="Visual Studio 17 2022"

      - name: Build examples
        shell: bash
        run: |
          mkdir -p build
          pushd build
            cmake .. -DUSER_SYSTEMC_INCLUDE_DIR=$(pwd)/../systemc/src \
                     -DUSER_SYSTEMC_LIB_DIR=$(pwd)/../artifacts/systemc \
                     -DCMAKE_CXX_STANDARD=17

            cmake --build . -j $(nproc)
          popd

          if [ "${{ runner.os }}" = "Linux" ]; then
            bin_path="."
          elif [ "${{ runner.os }}" = "Windows" ]; then
            bin_path="Debug"
          else
            echo "Unknown runner!"
            exit 1
          fi

          mkdir -p build
          mkdir -p artifacts/{example_binaries,test_binaries,shared_libs}

          for example in examples/*/; do
            example_name="$(basename $example)"
            cp build/examples/$example_name/$bin_path/$example_name artifacts/example_binaries/x64-systemc--$example_name
          done
          for test in tests/*/; do
            test_name="$(basename $test)"
            cp build/tests/$test_name/$bin_path/$test_name artifacts/test_binaries/x64-systemc--$test_name
          done
          for example in examples-native/*/; do
            example_name="$(basename $example)"

            if [ "${{ runner.os }}" = "Linux" ]; then
              bin_path="."
              library_name="lib$(basename $example | tr '-' '_').so"
            elif [ "${{ runner.os }}" = "Windows" ]; then
              bin_path="Debug"
              library_name="$(basename $example | tr '-' '_').dll"
            fi

            cp build/examples-native/$example_name/$bin_path/$library_name artifacts/shared_libs/$library_name
          done
        
      - name: Upload Example Binaries
        uses: actions/upload-artifact@v4
        with:
          name: example_binaries-${{ runner.os }}-${{ github.run_id }}
          path: artifacts/example_binaries

      - name: Upload Test Binaries
        uses: actions/upload-artifact@v4
        with:
          name: test_binaries-${{ runner.os }}-${{ github.run_id }}
          path: artifacts/test_binaries

      - name: Upload Example Libs
        uses: actions/upload-artifact@v4
        with:
          name: example_libs-${{ runner.os }}-${{ github.run_id }}
          path: artifacts/shared_libs

  test-examples:
    name: Test Examples
    needs: build-examples
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - windows-2025
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download example binaries
        uses: actions/download-artifact@v4
        with:
          name: example_binaries-${{ runner.os }}-${{ github.run_id }}
          path: artifacts/example_binaries

      - name: Download test binaries
        uses: actions/download-artifact@v4
        with:
          name: test_binaries-${{ runner.os }}-${{ github.run_id }}
          path: artifacts/test_binaries

      - name: Download example libs
        uses: actions/download-artifact@v4
        with:
          name: example_libs-${{ runner.os }}-${{ github.run_id }}
          path: artifacts/shared_libs

      - name: Download and build Renode
        uses: antmicro/renode-test-action@v5.0.0
        with:
          renode-repository: ${{ inputs.renode_gitrepo || 'https://github.com/renode/renode' }}
          renode-revision: ${{ inputs.renode_gitrev || 'master' }}

      - name: Run tests (native)
        shell: bash
        run: |
          for example in artifacts/shared_libs/*; do
            example_name="$(basename $example | sed -e 's/\.so$//' -e 's/\.dll$//' -e 's/^lib//' | tr '_' '-')"
            if [ "${{ runner.os }}" = "Linux" ]; then
              bin_path="."
            elif [ "${{ runner.os }}" = "Windows" ]; then
              bin_path="Debug"
            fi
            mkdir -p examples-native/$example_name/build/$bin_path
            cp $example examples-native/$example_name/build/$bin_path
          done

          pushd examples-native
            TESTYAML=all_examples.yaml
            if [ "${{ runner.os }}" = "Windows" ]; then
              TESTYAML=all_examples_windows.yaml
            fi
            renode-test -t "$TESTYAML" -r "$(realpath -m ../artifacts/renode_logs/examples-native)"
          popd
          
      - name: Run tests (socket)
        shell: bash
        if: always()
        run: |
          for example in artifacts/example_binaries/*; do
            example_name="$(basename $example | sed -e 's/x64-systemc--//' -e 's/.elf//' -e 's/.exe//')"
            mkdir -p examples/$example_name/bin
            cp $example examples/$example_name/bin/$example_name
          done

          for test in artifacts/test_binaries/*; do
            test_name="$(basename $test | sed -e 's/x64-systemc--//' -e 's/.elf//' -e 's/.exe//')"
            mkdir -p tests/$test_name/bin
            cp $test tests/$test_name/bin/$test_name
          done

          pushd examples
            renode-test -t all_examples.yaml -r $(realpath -m ../artifacts/renode_logs/examples)
          popd

          pushd tests
            renode-test -t all_tests.yaml -r $(realpath -m ../artifacts/renode_logs/tests)
          popd

      - name: Upload Renode Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: renode_logs-${{ runner.os }}-${{ github.run_id }}
          path: artifacts/renode_logs
